# RDT-170M backbone (matches Hugging Face robotics-diffusion-transformer/rdt-170m config.json rdt block).
# Use for inference / load_state_dict when finetuning from rdt-170m. 1B remains in configs/base.yaml.
common:
  img_history_size: 2
  action_chunk_size: 64
  num_cameras: 3
  state_dim: 128

dataset:
  buf_path: /path/to/buffer
  buf_num_chunks: 512
  buf_chunk_size: 512
  epsd_len_thresh_low: 32
  epsd_len_thresh_high: 2048
  image_aspect_ratio: pad
  tokenizer_max_length: 1024

model:
  lang_adaptor: mlp2x_gelu
  img_adaptor: mlp2x_gelu
  state_adaptor: mlp3x_gelu
  lang_token_dim: 4096
  img_token_dim: 1152
  state_token_dim: 128
  rdt:
    hidden_size: 1024
    depth: 14
    num_heads: 32
    cond_pos_embed_type: multimodal
  noise_scheduler:
    type: ddpm
    num_train_timesteps: 1000
    num_inference_timesteps: 5
    beta_schedule: squaredcos_cap_v2
    prediction_type: sample
    clip_sample: False
  ema:
    update_after_step: 0
    inv_gamma: 1.0
    power: 0.75
    min_value: 0.0
    max_value: 0.9999
